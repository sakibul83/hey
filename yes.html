<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Can’t Wait 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* Card */
.container {
  max-width: 600px;
  padding: 50px;
  background: rgba(255, 255, 255, 0.12);
  border-radius: 25px;
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  animation: fadeIn 1.8s ease forwards;
}

/* Fade-in animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Floating hearts */
.heart {
  position: absolute;
  font-size: 20px;
  animation: floatUp 7s linear infinite;
  opacity: 0.7;
}

@keyframes floatUp {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-110vh); opacity: 0; }
}

h1 {
  font-size: 36px;
  margin-bottom: 25px;
  color: #ff4d6d;
  font-weight: 600;
}

p {
  font-size: 20px;
  font-weight: 400;
  line-height: 1.8;
}
</style>
</head>

<body>

<div class="container">
  <h1>Runni 💖</h1>
  <p>
    I’m so happy you said yes. I can’t wait to see you, hear your voice, and just be there with you. I promise to try not to make too many bad jokes… or maybe I’ll make just enough to make it weird. Either way, being with you is already the best part, and I can’t wait for the 13th.
  </p>
</div>

<script>
// Floating hearts
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.bottom = "-20px";
  heart.style.fontSize = (Math.random() * 20 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 3 + 6) + "s"; // varied speed
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 9000);
}

// Create multiple hearts over time
setInterval(createHeart, 500);
</script>

</body>
</html>
